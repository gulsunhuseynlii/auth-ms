spring:
  application:
    name: auth-ms
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: 1234
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:liquibase/db.changelog-master.yaml
    enabled: true
jwt:
  secret: mySecretKeyMySecretKeyMySecretKeyMySecretKey123456
  expiration: 3600000
  refresh-expiration: 604800000
server:
  port: 8081